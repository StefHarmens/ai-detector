name: Detector

on:
  push:
    tags:
      - "detector/v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.11"
  PYINSTALLER_ARGS: --onefile --hidden-import ultralytics --collect-all litellm --collect-all onnxruntime --collect-all onnx --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --paths src --clean --noconfirm
  VERSION_FILE: src/aidetector/utils/version.py

jobs:
  build:
    name: Ultralytics Image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=^detector/v(.*)$
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v') && !contains(github.ref_name, '-') }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: detector
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REF_NAME=${{ github.ref_name }}
          outputs: type=image,name=ghcr.io/eschouten/ai-detector,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  jetpack6-image:
    name: Jetpack 6 Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector
          flavor: |
            latest=false
            suffix=-jetpack6,onlatest=true
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=^detector/v(.*)$
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v') && !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: detector
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REF_NAME=${{ github.ref_name }}
            ULTRALYTICS_TAG_ARM64=latest-jetson-jetpack6
          cache-from: type=gha,scope=jetson
          cache-to: type=gha,mode=max,scope=jetson

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=^detector/v(.*)$
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v') && !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/eschouten/ai-detector@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/eschouten/ai-detector:${{ steps.meta.outputs.version }}

  windows-exe:
    name: ${{ matrix.job_name }}
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: Windows WindowsML Executable
            artifact_prefix: aidetector-winml
            type: windowsml
            uv_run_args: --extra windowsml
            needs_cuda_install: false
            publish_release_asset: "true"
          - job_name: Windows CUDA 13.0 Executable
            artifact_prefix: aidetector-cuda130
            type: cuda
            uv_run_args: --no-sync
            needs_cuda_install: true
            cuda_index_url: https://download.pytorch.org/whl/cu130
            publish_release_asset: "true"
          - job_name: Windows CUDA 12.6 Executable
            artifact_prefix: aidetector-cuda126
            type: cuda
            uv_run_args: --no-sync
            needs_cuda_install: true
            cuda_index_url: https://download.pytorch.org/whl/cu126
            publish_release_asset: "false"
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    env:
      PUBLISH_RELEASE_ASSET: ${{ matrix.publish_release_asset }}
    steps:
      - uses: actions/checkout@v6

      - name: Version
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("detector/")) {
            $version = $version.Substring("detector/".Length)
          } else {
            $version = $version -replace "/", "-"
          }
          $artifactName = "${{ matrix.artifact_prefix }}-$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "ARTIFACT_NAME=$artifactName" >> $env:GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        if: ${{ matrix.needs_cuda_install }}
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install --pre . torch torchvision pyinstaller --index-url ${{ matrix.cuda_index_url }} --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match

      - name: Build Executable
        run: |
          echo 'TYPE = "${{ matrix.type }}"' > ${{ env.VERSION_FILE }}
          echo 'REF_NAME = "${{ github.ref_name }}"' >> ${{ env.VERSION_FILE }}
          uv run ${{ matrix.uv_run_args }} pyinstaller src/aidetector/__init__.py --name $env:ARTIFACT_NAME ${{ env.PYINSTALLER_ARGS }}

      - name: Upload Executable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}-exe
          path: detector/dist/${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.exe

      - name: Zip Release Asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v') && env.PUBLISH_RELEASE_ASSET == 'true'
        run: |
          7z a -tzip -mx=1 "dist\${env:ARTIFACT_NAME}.zip" "dist\${env:ARTIFACT_NAME}.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "7z failed with exit code $LASTEXITCODE"
          }

      - name: Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v') && env.PUBLISH_RELEASE_ASSET == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Detector ${{ steps.version.outputs.version }}
          make_latest: false
          files: detector/dist/${{ matrix.artifact_prefix }}-${{ steps.version.outputs.version }}.zip

  macos-default-exe:
    name: MacOS Default Executable
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: detector
    steps:
      - uses: actions/checkout@v6

      - name: Version
        id: version
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "${version}" == detector/* ]]; then
            version="${version#detector/}"
          else
            version="${version//\//-}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_NAME=aidetector-osx-${version}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build Executable
        run: |
          echo 'TYPE = "default"' > ${{ env.VERSION_FILE }}
          echo 'REF_NAME = "${{ github.ref_name }}"' >> ${{ env.VERSION_FILE }}
          uv run --extra default pyinstaller src/aidetector/__init__.py --name "$ARTIFACT_NAME" ${{ env.PYINSTALLER_ARGS }}

      - name: Upload Executable
        uses: actions/upload-artifact@v7
        with:
          name: aidetector-osx-${{ steps.version.outputs.version }}-exe
          path: detector/dist/aidetector-osx-${{ steps.version.outputs.version }}

      - name: Zip Release Asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v')
        run: |
          ditto -c -k "dist/${ARTIFACT_NAME}" "dist/${ARTIFACT_NAME}.zip"

      - name: Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/detector/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Detector ${{ steps.version.outputs.version }}
          make_latest: false
          files: detector/dist/aidetector-osx-${{ steps.version.outputs.version }}.zip
