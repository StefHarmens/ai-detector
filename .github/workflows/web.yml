name: Web

on:
  push:
    tags:
      - "web/v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector-web
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }},match=^web/v(.*)$
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/web/v') && !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: web
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: pnpm install

      - name: "Warm Bun compile cache (Windows D: workaround)"
        run: |
          $warmupRoot = "C:\bun-warmup-${env:GITHUB_RUN_ID}"
          New-Item -ItemType Directory -Path $warmupRoot -Force | Out-Null
          Set-Content -Path "$warmupRoot\index.ts" -Encoding UTF8 -Value 'console.log("bun warmup");'
          Push-Location $warmupRoot
          bun build --compile --target=bun-windows-x64-baseline .\index.ts --outfile .\warmup-baseline.exe
          bun build --compile --target=bun-windows-x64 .\index.ts --outfile .\warmup.exe
          Pop-Location
          Remove-Item -Path $warmupRoot -Recurse -Force

      - name: Stage FFmpeg static asset
        run: |
          $ffmpegPath = node -e "const ffmpegPath = require('ffmpeg-static'); if (!ffmpegPath) { throw new Error('ffmpeg-static did not resolve a binary path'); } process.stdout.write(ffmpegPath);"
          if (-not (Test-Path $ffmpegPath -PathType Leaf)) {
            throw "ffmpeg-static binary path does not exist: $ffmpegPath"
          }

          $targetDirectory = Join-Path (Get-Location) "static\_internal"
          New-Item -ItemType Directory -Path $targetDirectory -Force | Out-Null

          $targetPath = Join-Path $targetDirectory "ffmpeg.exe"
          Copy-Item -Path $ffmpegPath -Destination $targetPath -Force

          $fileInfo = Get-Item $targetPath
          if ($fileInfo.Length -le 0) {
            throw "Copied ffmpeg.exe is empty: $targetPath"
          }

          Write-Host "FFmpeg asset staged at $targetPath ($($fileInfo.Length) bytes)"

      - name: Build
        run: pnpm run build

      - name: Version exe
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("web/")) {
            $version = $version.Substring("web/".Length)
          } else {
            $version = $version -replace "/", "-"
          }
          Move-Item -Path "dist\ai-detector-web.exe" -Destination "dist\ai-detector-web-$version.exe" -Force
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload exe
        uses: actions/upload-artifact@v7
        with:
          name: ai-detector-web-${{ steps.version.outputs.version }}-exe
          path: web/dist/ai-detector-web-${{ steps.version.outputs.version }}.exe

      - name: Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/web/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Web ${{ steps.version.outputs.version }}
          make_latest: false
          files: web/dist/ai-detector-web-${{ steps.version.outputs.version }}.exe
