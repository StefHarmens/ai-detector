services:
  aidetector:
    build:
      context: ../detector
    image: "ai-detector-local:dev"
    restart: unless-stopped

    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      AIDETECTOR_MAX_BUFFERED_DETECTIONS: 60
      AIDETECTOR_MAX_BUFFERED_DETECTION_MB: 256
      AIDETECTOR_MAX_PENDING_EXPORTS: 1
      AIDETECTOR_ORT_ENABLE_MEM_PATTERN: "false"
      AIDETECTOR_ORT_ENABLE_CPU_MEM_ARENA: "false"
      AIDETECTOR_MAX_RSS_MB: 2500
      OMP_NUM_THREADS: 4

    volumes:
      - ./config.json:/app/config.json
      - ./app.json:/app/app.json
      - ./sprong24.mp4:/app/sprong24.mp4
      - ./detections/:/app/detections

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  web:
    image: "ghcr.io/eschouten/ai-detector-web:latest"
    depends_on:
      - aidetector
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "80:3000"
    volumes_from:
      - aidetector
